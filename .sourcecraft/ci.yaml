on:
  push:
    - main

workflows:
  build-site:
    tasks:
      - name: build-mkdocs-site
        image: docker.io/library/python:3.12-slim
        script:
          - pip install mkdocs mkdocs-material
          - mkdocs build -d ./site

      - name: publish-to-release-branch
        script:
          - git checkout -b release || git checkout release
          - git add -f site/
          - git commit -m "feat: автоматическое обновление сайта" || echo "No changes"
          - git push origin release -f