jobs:
  build:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - name: "1. Checkout main"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Важно для корректной работы mkdocs-git-revision-date-localized-plugin, если он есть

      - name: "2. Initialize Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: "3. Install Project Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "4. Build and Push to GitHub Pages"
        run: |
          # Настройка бота, чтобы гит не ругался на отсутствие автора коммита
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Сама команда деплоя:
          # --force принудительно пушит в gh-pages
          # --clean удаляет старые файлы из папки сборки перед новой
          # --ignore-version-edit помогает, если в ветке gh-pages застряли метаданные от старых версий
          mkdocs gh-deploy --config-file mkdocs.yml --force --clean --ignore-version-edit




